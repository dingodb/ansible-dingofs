---
# ============================================================
# Role: dingo_client - Deploy dingo-client (FUSE mount) services
# ============================================================

- name: Set default list of dingo clients if not provided
  set_fact:
    dingo_clients:
      - fsname: "{{ dingo_client_fsname }}"
        mount_point: "{{ dingo_client_mount_point }}"
        port: "{{ dingo_client_port }}"
        cache_group: "{{ dingo_client_cache_group }}"
        log_dir: "{{ dingo_client_log_dir }}"
        mds_addrs: "{{ dingo_client_mds_addrs }}"
        base_dir: "{{ dingo_client_base_dir }}"
  when: dingo_clients is not defined

- name: Deploy each dingo-client instance
  include_tasks: instance.yml
  vars:
    dingo_client_fsname: "{{ client_instance.fsname }}"
    dingo_client_mount_point: "{{ client_instance.mount_point }}"
    dingo_client_port: "{{ client_instance.port }}"
    dingo_client_cache_group: "{{ client_instance.cache_group | default(hostvars[inventory_hostname]['dingo_client_cache_group']) }}"
    dingo_client_service_name: "dingofs-mount-{{ client_instance.fsname }}"
    dingo_client_log_dir: "{{ client_instance.log_dir | default('/mnt/disk1/dingofs/logs/' ~ client_instance.fsname) }}"
    dingo_client_mds_addrs: "{{ client_instance.mds_addrs | default(hostvars[inventory_hostname]['dingo_client_mds_addrs']) }}"
    dingo_client_base_dir: "{{ client_instance.base_dir | default('/root/dingofs/dingo-client/' ~ client_instance.fsname) }}"
  loop: "{{ dingo_clients }}"
  loop_control:
    loop_var: client_instance

